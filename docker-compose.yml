version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    env_file: .env
    volumes:
      - db_data:/var/lib/mysql
      # initialize DB from the provided SQL dump on first run
      - ./backend2/src/DBmysql/DB.sql:/docker-entrypoint-initdb.d/DB.sql:ro
    command: ["--init-file=/docker-entrypoint-initdb.d/DB.sql"]
    networks:
      - ifpa_net
    container_name: mysql
    ports:
      - "3306:3306"

  backend:
    build:
      context: ./backend2
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: api_repo
    env_file: .env
    environment:
      - PORT=3333
      - DB_HOST=mysql
      - DB_PORT=3306
    ports:
      - "3333:3333"
    # Backend should not be exposed directly to the host; accessible only within the Docker network
    depends_on:
      - db
    networks:
      - ifpa_net

  frontend:
    build:
      context: ./frontrepo
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: frontrepo
    env_file: .env
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - ifpa_net

  nginx:
    image: nginx:stable
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx_cert:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - ifpa_net

volumes:
  db_data:

networks:
  ifpa_net:
    driver: bridge
