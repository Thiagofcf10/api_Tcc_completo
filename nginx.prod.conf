# Nginx reverse-proxy config for production
# Serves frontend at / and proxies /api/ to the backend

upstream frontend_upstream {
  server frontend:3000;
}

upstream backend_upstream {
  server backend:3333;
}

server {
  listen 80;
  listen [::]:80;
  # Accept requests by IP and by domain/subdomains. Example: 192.168.1.118 repo.ifpa.com *. and any subdomain (*.repo.ifpa.com).
  server_name repo.ifpa.com; # replace with your actual domain in production

  # Redirect HTTP to HTTPS (if you set up HTTPS)
  # return 301 https://$host$request_uri;

  location /api/ {
    proxy_pass http://backend_upstream/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://frontend_upstream/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
  }
}
